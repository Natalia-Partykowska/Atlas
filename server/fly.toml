app = "atlas-orbit"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  ALLOWED_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173"
  RUST_LOG = "atlas_orbit=info,tower_http=info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
